<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CGI — Assignment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h2 { border-bottom: 2px solid #2563eb; padding-bottom: .5rem; }
    label { display: block; margin-bottom: .5rem; font-weight: 500; }
    input[type="text"], input[type="number"] { width: 100%; padding: .5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    button { margin-top: 1rem; padding: .5rem 1.5rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    p.note { color: #666; font-size: .85rem; }
  </style>
</head>
<body>
  <h2>Assignment — Greeting (GET)</h2>
  <p class="note">Sends <code>name</code> and <code>age</code> via <code>QUERY_STRING</code> to your CGI program.</p>
  <form action="cgi-bin/assignment" method="GET">
    <label>Name: <input type="text" name="name" required></label>
    <label>Age: <input type="number" name="age" required></label>
    <button type="submit">Greet me!</button>
  </form>
</body>
</html>
