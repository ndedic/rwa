<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CGI — Todo API Client</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h2 { border-bottom: 2px solid #2563eb; padding-bottom: .5rem; }
    button { padding: .5rem 1.5rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    ul { list-style: none; padding: 0; }
    li { padding: .5rem 0; border-bottom: 1px solid #eee; }
    li.checked { text-decoration: line-through; color: #999; }
    p.note { color: #666; font-size: .85rem; }
    #status { margin-top: 1rem; font-style: italic; color: #666; }
  </style>
</head>
<body>
  <h2>Todo API (AJAX → CGI)</h2>
  <p class="note">Calls a <strong>C program</strong> via CGI that returns JSON. The browser parses the response and renders it as a list.</p>
  <button id="load">Load Todos</button>
  <p id="status"></p>
  <ul id="todos"></ul>

  <script>
    document.getElementById('load').addEventListener('click', function () {
      var status = document.getElementById('status');
      var list = document.getElementById('todos');
      status.textContent = 'Loading...';
      list.innerHTML = '';

      var xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            var items = JSON.parse(xhr.responseText);
            status.textContent = items.length + ' items loaded';
            items.forEach(function (item) {
              var li = document.createElement('li');
              li.textContent = item.text;
              if (item.checked) li.className = 'checked';
              list.appendChild(li);
            });
          } else {
            status.textContent = 'Error: ' + xhr.status;
          }
        }
      };
      xhr.open('GET', 'cgi-bin/todo-api');
      xhr.send();
    });
  </script>
</body>
</html>
